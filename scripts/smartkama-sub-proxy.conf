server {
    listen 2096 ssl;
    server_name sub.smartkama.ru;

    ssl_certificate     /etc/letsencrypt/live/sub.smartkama.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sub.smartkama.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Shortlink requests → shortlink service (pbk/fp injection)
    location /s/ {
        proxy_pass http://127.0.0.1:9101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header User-Agent $http_user_agent;
    }

    # Native subscription endpoint → shortlink service normalization layer
    location /sub/ {
        proxy_pass http://127.0.0.1:9101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header User-Agent $http_user_agent;
    }

    # Pretty subscription URL support: /<sub_id> -> /sub/<sub_id>
    location ~ ^/([A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9])$ {
        rewrite ^/([A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9][A-Za-z0-9])$ /sub/$1 last;
    }

    # Everything else (native sub, json, panel home) → x-ui internal
    location / {
        proxy_pass https://127.0.0.1:2097;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
